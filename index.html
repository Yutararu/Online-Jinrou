<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>リアルタイム探索・密談人狼</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; color: #e0e0e0; transition: background 0.3s; }
        body.bg-lobby { background-color: #0f111a; }
        body.bg-day { background-color: #1a1c24; }
        body.bg-night { background-color: #05050a; }

        .container { background: #1f2330; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid #2f364d; }
        h2 { text-align: center; margin-top: 0; color: #00ffff; }
        #timer-display { text-align: center; font-size: 1.3rem; font-weight: bold; color: #ff9f43; margin-bottom: 15px; display: none; }
        .mode-selection { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-mode { flex: 1; padding: 12px; background: #2a2f45; color: white; border: 1px solid #414a6b; border-radius: 6px; cursor: pointer; }
        .btn-mode.active-host { background: #2eb872; }
        .btn-mode.active-join { background: #00a8ff; }
        .setup-section { padding: 15px; border-radius: 6px; margin-bottom: 15px; display: none; background: #262b3d; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .form-group-checkbox { margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .form-group-checkbox input { width: 18px; height: 18px; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 10px; background: #151821; color: #fff; border: 1px solid #414a6b; border-radius: 6px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #btn-start-host { background: #2eb872; }
        #btn-start-join { background: #00a8ff; }
        #btn-game-control { background: #ff9f43; display: none; margin-bottom: 10px; }
        #btn-reset-game { background: #414a6b; display: none; margin-bottom: 10px; }

        .area-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; display: none; }
        .area-card { background: #262b3d; border: 2px solid #414a6b; border-radius: 6px; padding: 10px; text-align: center; cursor: pointer; }
        .area-card.active { border-color: #00ffff; background: #2a3b5c; }
        .player-badges { font-size: 0.8rem; color: #aaa; margin-top: 5px; }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; font-size: 1.8rem; color: #00ffff; }

        .action-panel { background: rgba(255,159,67,0.1); border: 1px solid #ff9f43; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; text-align: center; }
        .action-panel select { padding: 8px; background: #151821; color: white; border: 1px solid #414a6b; border-radius: 4px; }
        #main-chat-log { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 6px; background: #151821; color: #e0e0e0; border: 1px solid #2f364d; resize: none; }
        .input-area { display: flex; gap: 8px; margin-top: 10px; }
        .input-area input { flex-grow: 1; padding: 10px; background: #151821; border: 1px solid #2f364d; color: white; border-radius: 6px; }
        .input-area button { padding: 0 20px; background: #ff4757; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .full-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); display: none; }
        .overlay-title { color: #aaa; font-size: 1.2rem; }
        .overlay-role { font-size: 2.5rem; font-weight: bold; margin-top: 10px; }
        .citizen-color { color: #2eb872; }
        .wolf-color { color: #ff4757; }
    </style>
</head>
<body class="bg-lobby">

<div id="overlay" class="full-overlay">
    <div class="overlay-title" id="overlay-title-text">通知</div>
    <div class="overlay-role" id="overlay-role-text">役職</div>
</div>

<div id="move-loading" class="loading-overlay">移動中...</div>

<div class="container">
    <h2>リアルタイム探索・密談人狼</h2>
    <div id="timer-display">残り時間: --秒</div>

    <div class="mode-selection" id="mode-select-area">
        <button class="btn-mode" id="choose-host">部屋を作る</button>
        <button class="btn-mode" id="choose-join">部屋に参加する</button>
    </div>

    <div class="setup-section" id="host-setup-panel">
        <div class="form-group"><label>名前</label><input type="text" id="host-name" placeholder="例: GM"></div>
        <div class="form-group"><label>部屋ID</label><input type="text" id="host-room-id" placeholder="例: secret-room"></div>
        <div class="form-group-checkbox">
            <input type="checkbox" id="host-use-bots" checked>
            <label for="host-use-bots" style="cursor:pointer; font-size:0.9rem;">練習用ボットを3人追加する</label>
        </div>
        <button id="btn-start-host" class="btn-action">部屋を開く</button>
    </div>

    <div class="setup-section" id="join-setup-panel">
        <div class="form-group"><label>名前</label><input type="text" id="join-name" placeholder="例: プレイヤーA"></div>
        <div class="form-group"><label>部屋ID</label><input type="text" id="join-target-id" placeholder="例: secret-room"></div>
        <button id="btn-start-join" class="btn-action">参加する</button>
    </div>

    <button id="btn-game-control" class="btn-action">ゲームを開始する</button>
    <button id="btn-reset-game" class="btn-action">ロビーに戻る</button>

    <p>状態: <span id="status-text">モードを選択してください。</span></p>

    <div class="area-container" id="area-selector-ui">
        <div class="area-card" id="card-square" onclick="selectArea('中央広場')"><h4>中央広場</h4><div class="player-badges" id="badge-square"></div></div>
        <div class="area-card" id="card-discussion" onclick="selectArea('議論場')"><h4>議論場</h4><div class="player-badges" id="badge-discussion"></div></div>
        <div class="area-card" id="card-mansion" onclick="selectArea('占いの館')"><h4>占いの館</h4><div class="player-badges" id="badge-mansion"></div></div>
        <div class="area-card" id="card-study" onclick="selectArea('書斎')"><h4>書斎</h4><div class="player-badges" id="badge-study"></div></div>
        <div class="area-card" id="card-armory" onclick="selectArea('武器庫')"><h4>武器庫</h4><div class="player-badges" id="badge-armory"></div></div>
        <div class="area-card" id="card-alley" onclick="selectArea('裏路地')"><h4>裏路地</h4><div class="player-badges" id="badge-alley"></div></div>
    </div>

    <div class="action-panel" id="game-action-panel">
        <span id="action-panel-label">ターゲット: </span>
        <select id="action-target-select"></select>
        <button id="btn-submit-action" style="padding: 5px 10px;">決定</button>
    </div>

    <div class="chat-section">
        <h4 id="chat-title">ロビーチャット</h4>
        <textarea id="main-chat-log" rows="10" readonly></textarea>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="メッセージ..." disabled>
        <button id="btn-send" disabled>送信</button>
    </div>
</div>

<script>
    let peer = null, connections = [], conn = null, isHost = false;
    let myName = "", myRole = "", currentPhase = "LOBBY", currentArea = "中央広場", isMoving = false;
    let playerList = [], lobbyDummies = ["ボットA", "ボットB", "ボットC"]; 
    let nightActions = {}, votesReceived = {}, countdownInterval = null;
    let botSeerMemory = {};

    const chooseHostBtn = document.getElementById('choose-host');
    const chooseJoinBtn = document.getElementById('choose-join');
    const hostPanel = document.getElementById('host-setup-panel');
    const joinPanel = document.getElementById('join-setup-panel');
    const statusText = document.getElementById('status-text');
    const mainChat = document.getElementById('main-chat-log');
    const chatTitle = document.getElementById('chat-title');
    const areaUI = document.getElementById('area-selector-ui');
    const msgInput = document.getElementById('msg-input');
    const btnSend = document.getElementById('btn-send');
    const btnGameControl = document.getElementById('btn-game-control');
    const btnResetGame = document.getElementById('btn-reset-game');
    const timerDisplay = document.getElementById('timer-display');
    const moveLoading = document.getElementById('move-loading');
    const overlay = document.getElementById('overlay');
    const overlayTitleText = document.getElementById('overlay-title-text');
    const overlayRoleText = document.getElementById('overlay-role-text');
    const gameActionPanel = document.getElementById('game-action-panel');
    const actionPanelLabel = document.getElementById('action-panel-label');
    const actionTargetSelect = document.getElementById('action-target-select');
    const btnSubmitAction = document.getElementById('btn-submit-action');

    chooseHostBtn.addEventListener('click', () => { chooseHostBtn.classList.add('active-host'); chooseJoinBtn.classList.remove('active-join'); hostPanel.style.display = 'block'; joinPanel.style.display = 'none'; });
    chooseJoinBtn.addEventListener('click', () => { chooseJoinBtn.classList.add('active-join'); chooseHostBtn.classList.remove('active-host'); joinPanel.style.display = 'block'; hostPanel.style.display = 'none'; });

    document.getElementById('btn-start-host').addEventListener('click', () => {
        const name = document.getElementById('host-name').value.trim();
        const roomId = document.getElementById('host-room-id').value.trim();
        const useBots = document.getElementById('host-use-bots').checked;
        if (!name || !roomId) return alert("入力不足");
        myName = name;
        peer = new Peer(roomId);
        peer.on('open', (id) => {
            isHost = true;
            statusText.textContent = `ホスト [部屋ID: ${id}]`;
            logMain(`[システム] 部屋を作成しました。ID: ${id}`);
            lockUI();
            btnGameControl.style.display = 'block';
            playerList.push({ name: myName, role: "市民", alive: true, area: "中央広場", isDummy: false });
            
            if (useBots) {
                lobbyDummies.forEach(d => {
                    playerList.push({ name: d, role: "市民", alive: true, area: "中央広場", isDummy: true });
                    logMain(`[入室] ${d} (ボット)`);
                });
            }
        });
        peer.on('connection', (c) => {
            connections.push(c);
            c.on('data', (data) => handleReceivedData(data, c));
            setTimeout(() => { 
                playerList.forEach(p => {
                    if (p.isDummy) c.send({ type: "DUMMY_JOIN_NOTICE", name: p.name });
                });
            }, 1000);
        });
    });

    document.getElementById('btn-start-join').addEventListener('click', () => {
        const name = document.getElementById('join-name').value.trim();
        const targetId = document.getElementById('join-target-id').value.trim();
        if (!name || !targetId) return alert("入力不足");
        myName = name;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(targetId);
            conn.on('open', () => {
                statusText.textContent = `${myName} で参加中`;
                lockUI();
                conn.send({ type: "JOIN_NAME", name: myName });
            });
            conn.on('data', (data) => handleReceivedData(data, null));
        });
    });

    function lockUI() { document.getElementById('mode-select-area').style.display = 'none'; hostPanel.style.display = 'none'; joinPanel.style.display = 'none'; msgInput.disabled = false; btnSend.disabled = false; }

    function handleReceivedData(data, senderConn) {
        if (isHost && senderConn) senderConn.playerName = data.name;
        switch(data.type) {
            case "JOIN_NAME":
                if (isHost) { playerList.push({ name: data.name, role: "市民", alive: true, area: "中央広場", isDummy: false }); logMain(`[入室] ${data.name} さん`); syncAllPlayers(); }
                break;
            case "DUMMY_JOIN_NOTICE": if (!isHost) logMain(`[入室] ${data.name} (ボット)`); break;
            case "START_GAME": playerList = data.players; myRole = playerList.find(p => p.name === myName)?.role || "市民"; showOverlay("ゲーム開始", `役職: ${myRole}`, myRole); break;
            case "SYNC_PLAYERS": playerList = data.players; updateAreaUIBadges(); break;
            case "MOVE_AREA": if (isHost) { let p = playerList.find(pl => pl.name === data.name); if (p) p.area = data.area; syncAllPlayers(); } break;
            case "PHASE_CHANGE": playerList = data.players; myRole = playerList.find(p => p.name === myName)?.role || myRole; executePhaseTransition(data.phase); break;
            case "TIMER_SYNC": timerDisplay.textContent = `残り時間: ${data.time}秒`; break;
            case "CHAT_BROADCAST": if (shouldReceiveMessage(data)) logMain(`[${data.area}] ${data.sender}: ${data.msg}`); break;
            case "SUBMIT_NIGHT_ACTION":
                if (isHost) {
                    nightActions[data.sender] = data.target;
                    if (data.role === "占い師") {
                        let t = playerList.find(p => p.name === data.target);
                        let res = (t.role === "人狼" || t.role === "裏切り者") ? "人狼" : "人間";
                        senderConn.send({ type: "PRIVATE_ALERT", title: "占い結果", body: `${data.target} は [ ${res} ]` });
                    }
                    evaluateNightActions();
                }
                break;
            case "SUBMIT_VOTE": if (isHost) { votesReceived[data.sender] = data.target; evaluateVotes(); } break;
            case "PRIVATE_ALERT": showOverlay(data.title, data.body); logMain(`[通知] ${data.title}: ${data.body}`); break;
            case "SYSTEM_LOG": logMain(data.msg); break;
        }
    }

    function shouldReceiveMessage(data) {
        let me = playerList.find(p => p.name === myName);
        if (!me) return false;
        if (!me.alive && data.area === "幽霊") return true;
        if (!me.alive) return false;
        if (data.area === "人狼会議" && myRole === "人狼") return true;
        return me.area === data.area && currentPhase === data.phase;
    }

    function selectArea(areaName) {
        if (currentPhase !== "DAY" || isMoving || currentArea === areaName) return;
        isMoving = true; moveLoading.style.display = 'flex';
        setTimeout(() => {
            currentArea = areaName; isMoving = false; moveLoading.style.display = 'none';
            document.querySelectorAll('.area-card').forEach(c => c.classList.remove('active'));
            const cardMap = { "中央広場": "card-square", "議論場": "card-discussion", "占いの館": "card-mansion", "書斎": "card-study", "武器庫": "card-armory", "裏路地": "card-alley" };
            document.getElementById(cardMap[areaName])?.classList.add('active');
            chatTitle.textContent = `${currentArea} のチャット`;
            mainChat.value = `--- ${currentArea} に移動しました ---\n`;
            if (isHost) { let me = playerList.find(p => p.name === myName); if (me) me.area = currentArea; syncAllPlayers(); }
            else { if (conn) conn.send({ type: "MOVE_AREA", name: myName, area: currentArea }); }
        }, 3000);
    }

    btnSend.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) sendMessage(); });
    function sendMessage() {
        const txt = msgInput.value.trim(); if (!txt) return;
        let areaContext = currentArea;
        if (!playerList.find(p => p.name === myName)?.alive) areaContext = "幽霊";
        else if (currentPhase === "NIGHT" && myRole === "人狼") areaContext = "人狼会議";
        logMain(`[${areaContext}] あなた: ${txt}`);
        sendDataToAll({ type: "CHAT_BROADCAST", sender: myName, msg: txt, area: areaContext, phase: currentPhase });
        msgInput.value = "";
    }

    btnGameControl.addEventListener('click', () => {
        if (!isHost || currentPhase !== "LOBBY") return;
        if (playerList.length < 3) return alert("ゲームを開始するには最低3人必要です（ボット含め）");
        let roles = ["人狼", "占い師", "怪盗", "市民", "狂人", "騎士", "裏切り者", "市民"].slice(0, playerList.length);
        while (roles.length < playerList.length) roles.push("市民");
        roles.sort(() => Math.random() - 0.5);
        playerList.forEach((p, i) => { p.role = roles[i]; p.alive = true; p.area = "中央広場"; });
        sendDataToAll({ type: "START_GAME", players: playerList });
        myRole = playerList.find(p => p.name === myName).role;
        showOverlay("ゲーム開始", `役職: ${myRole}`, myRole);
        btnGameControl.style.display = 'none'; btnResetGame.style.display = 'block';
        setTimeout(() => { changePhase("NIGHT"); }, 3000);
    });

    btnResetGame.addEventListener('click', () => { if (isHost) location.reload(); });

    function changePhase(nextPhase) {
        currentPhase = nextPhase;
        if (nextPhase === "NIGHT") { nightActions = {}; playerList.forEach(p => p.area = "中央広場"); }
        else if (nextPhase === "DAY") { votesReceived = {}; }
        sendDataToAll({ type: "PHASE_CHANGE", phase: nextPhase, players: playerList });
        executePhaseTransition(nextPhase);
    }

    function startDayTimer() {
        if (countdownInterval) clearInterval(countdownInterval);
        let timeLeft = 60; timerDisplay.style.display = 'block'; timerDisplay.textContent = `残り時間: ${timeLeft}秒`;
        countdownInterval = setInterval(() => {
            timeLeft--; timerDisplay.textContent = `残り時間: ${timeLeft}秒`;
            sendDataToAll({ type: "TIMER_SYNC", time: timeLeft });
            if (timeLeft <= 0) { clearInterval(countdownInterval); if (isHost) changePhase("VOTE"); }
        }, 1000);
    }

    function executePhaseTransition(phase) {
        currentPhase = phase; gameActionPanel.style.display = 'none';
        if (phase !== "DAY") timerDisplay.style.display = 'none';
        if (countdownInterval) clearInterval(countdownInterval);
        
        let me = playerList.find(p => p.name === myName);
        if (!me || !me.alive) { statusText.textContent = "死亡しました（観戦・幽霊チャット可）"; document.body.className = "bg-night"; areaUI.style.display = 'none'; chatTitle.textContent = "幽霊チャット"; return; }

        if (phase === "NIGHT") {
            document.body.className = "bg-night"; areaUI.style.display = 'none';
            showOverlay("夜フェーズ", "役職行動を選択してください", "人狼");
            chatTitle.textContent = myRole === "人狼" ? "人狼チャット" : "夜間待機";
            mainChat.value = "";
            if (["人狼", "占い師", "騎士", "怪盗"].includes(myRole)) activateActionUI(`${myRole}の行動先: `, false);
            if (isHost) setTimeout(() => { executeBotNightActions(); }, 2000);
        } 
        else if (phase === "DAY") {
            document.body.className = "bg-day"; areaUI.style.display = 'grid';
            showOverlay("朝フェーズ", "自由に移動して密談してください", "市民");
            statusText.textContent = "昼フェーズ：エリア移動と限定チャットが可能";
            currentArea = "中央広場"; chatTitle.textContent = `${currentArea} のチャット`; mainChat.value = "";
            document.querySelectorAll('.area-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-square')?.classList.add('active');
            if (isHost) startDayTimer();
        }
        else if (phase === "VOTE") {
            document.body.className = "bg-night"; areaUI.style.display = 'none';
            chatTitle.textContent = "投票フェーズ";
            activateActionUI("追放投票先: ", true);
            if (isHost) setTimeout(() => { executeBotVotes(); }, 2000);
        }
    }

    function activateActionUI(labelText, includeSelf) {
        actionPanelLabel.textContent = labelText; actionTargetSelect.innerHTML = "";
        playerList.forEach(p => {
            if (!p.alive) return;
            if (!includeSelf && p.name === myName) return;
            let opt = document.createElement('option'); opt.value = p.name; opt.textContent = p.name;
            actionTargetSelect.appendChild(opt);
        });
        if (actionTargetSelect.children.length > 0) { gameActionPanel.style.display = 'block'; btnSubmitAction.disabled = false; }
    }

    btnSubmitAction.addEventListener('click', () => {
        const target = actionTargetSelect.value; if (!target) return;
        btnSubmitAction.disabled = true; gameActionPanel.style.display = 'none';
        if (currentPhase === "NIGHT") {
            if (isHost) { nightActions[myName] = target; evaluateNightActions(); } 
            else { if (conn) conn.send({ type: "SUBMIT_NIGHT_ACTION", role: myRole, target: target }); }
        } else if (currentPhase === "VOTE") {
            if (isHost) { votesReceived[myName] = target; evaluateVotes(); } 
            else { if (conn) conn.send({ type: "SUBMIT_VOTE", sender: myName, target: target }); }
        }
    });

    function evaluateNightActions() {
        const requiredActators = playerList.filter(p => p.alive && ["人狼", "占い師", "怪盗", "騎士"].includes(p.role));
        const currentActionCount = Object.keys(nightActions).length;

        if (currentActionCount >= requiredActators.length) {
            let robber = playerList.find(p => p.role === "怪盗" && p.alive);
            let rTargetName = robber ? nightActions[robber.name] : null;
            if (robber && rTargetName) {
                let victim = playerList.find(p => p.name === rTargetName);
                if (victim) {
                    let stolen = victim.role; victim.role = "市民"; robber.role = stolen;
                    sendPrivateNotice(robber.name, "怪盗結果", `${victim.name} の役職 [ ${stolen} ] を盗みました`);
                    sendPrivateNotice(victim.name, "盗難発生", "役職を盗まれ市民になりました");
                }
            }

            let wolf = playerList.find(p => p.role === "人狼" && p.alive);
            let knight = playerList.find(p => p.role === "騎士" && p.alive);
            let wTarget = wolf ? nightActions[wolf.name] : null;
            let kTarget = knight ? nightActions[knight.name] : null;

            let report = "[朝の報告] 昨晩の犠牲者はありませんでした。";
            if (wTarget) {
                if (kTarget && wTarget === kTarget) {
                    report = "[朝の報告] 騎士の護衛により襲撃は防がれました。";
                } else {
                    let vic = playerList.find(p => p.name === wTarget);
                    if (vic) { vic.alive = false; report = `[朝の報告] 昨晩 ${vic.name} さんが襲撃され死亡しました。`; }
                }
            }

            sendDataToAll({ type: "SYSTEM_LOG", msg: report });
            if (checkVictoryConditions()) return;
            setTimeout(() => { changePhase("DAY"); }, 3000);
        }
    }

    function evaluateVotes() {
        const alivePlayers = playerList.filter(p => p.alive);
        const currentVoteCount = Object.keys(votesReceived).length;

        if (currentVoteCount >= alivePlayers.length) {
            let tally = {};
            Object.values(votesReceived).forEach(t => tally[t] = (tally[t] || 0) + 1);
            let executionTarget = null, maxVotes = -1;
            for (let name in tally) { if (tally[name] > maxVotes) { maxVotes = tally[name]; executionTarget = name; } }

            let msg = `[投票結果] 投票により ${executionTarget} さんが追放されました。`;
            let victim = playerList.find(p => p.name === executionTarget);
            if (victim) victim.alive = false;

            sendDataToAll({ type: "SYSTEM_LOG", msg: msg });
            if (checkVictoryConditions()) return;
            setTimeout(() => { changePhase("NIGHT"); }, 3000);
        }
    }

    function checkVictoryConditions() {
        const wolfCount = playerList.filter(p => p.role === "人狼" && p.alive).length;
        const humanCount = playerList.filter(p => p.role !== "人狼" && p.alive).length;
        if (wolfCount === 0) { sendDataToAll({ type: "PRIVATE_ALERT", title: "ゲーム終了", body: "市民陣営の勝利！" }); return true; }
        if (wolfCount >= humanCount) { sendDataToAll({ type: "PRIVATE_ALERT", title: "ゲーム終了", body: "人狼陣営の勝利！" }); return true; }
        return false;
    }

    function executeBotNightActions() {
        playerList.forEach(p => {
            if (!p.isDummy || !p.alive) return;
            let targets = playerList.filter(t => t.alive && t.name !== p.name);
            if (targets.length === 0) return;
            let rTarget = targets[Math.floor(Math.random() * targets.length)].name;

            if (["人狼", "騎士", "怪盗"].includes(p.role)) nightActions[p.name] = rTarget;
            if (p.role === "占い師") {
                nightActions[p.name] = rTarget;
                let isW = ["人狼", "裏切り者"].includes(playerList.find(t => t.name === rTarget).role);
                botSeerMemory[p.name] = { target: rTarget, isWolf: isW };
            }
        });
        evaluateNightActions();
    }

    function executeBotVotes() {
        playerList.forEach(p => {
            if (!p.isDummy || !p.alive) return;
            let targetName = "";
            if (p.role === "占い師" && botSeerMemory[p.name]?.isWolf) {
                let t = playerList.find(t => t.name === botSeerMemory[p.name].target);
                if (t && t.alive) targetName = t.name;
            }
            if (!targetName) {
                let targets = playerList.filter(t => t.alive && t.name !== p.name);
                targetName = targets[Math.floor(Math.random() * targets.length)].name;
            }
            votesReceived[p.name] = targetName;
        });
        evaluateVotes();
    }

    function syncAllPlayers() { if (isHost) sendDataToAll({ type: "SYNC_PLAYERS", players: playerList }); updateAreaUIBadges(); }
    function sendDataToAll(data) { if (isHost) { connections.forEach(c => { if (c.open) c.send(data); }); } else { if (conn?.open) conn.send(data); } }
    function sendPrivateNotice(targetName, title, body) {
        if (myName === targetName) showOverlay(title, body);
        else { let c = connections.find(cn => cn.playerName === targetName); if (c?.open) c.send({ type: "PRIVATE_ALERT", title: title, body: body }); }
    }

    function updateAreaUIBadges() {
        const areaIds = { "中央広場": "badge-square", "議論場": "badge-discussion", "占いの館": "badge-mansion", "書斎": "badge-study", "武器庫": "badge-armory", "裏路地": "badge-alley" };
        Object.keys(areaIds).forEach(a => {
            let inRoom = playerList.filter(p => p.area === a && p.alive).map(p => p.name);
            let b = document.getElementById(areaIds[a]);
            if (b) b.textContent = inRoom.length > 0 ? inRoom.join(", ") : "なし";
        });
    }

    function logMain(m) { mainChat.value += m + "\n"; mainChat.scrollTop = mainChat.scrollHeight; }
    function showOverlay(title, body, roleStyle = "") {
        overlayTitleText.textContent = title; overlayRoleText.textContent = body;
        overlayRoleText.className = ["人狼", "裏切り者"].includes(roleStyle) ? "overlay-role wolf-color" : "overlay-role citizen-color";
        overlay.style.display = 'flex'; setTimeout(() => overlay.style.display = 'none', 3000);
    }
</script>
</body>
</html>
